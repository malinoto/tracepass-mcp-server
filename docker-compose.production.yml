# Production compose for the TracePass MCP server.
#
# One service: the MCP HTTP server, joined to the shared `tracepass`
# docker network (declared external — created and owned by the
# tracepass-platform production compose).
#
# Served publicly at https://ai.tracepass.eu/mcp. Caddy (in the
# platform stack) reverse-proxies that hostname to mcp:8080 over the
# shared network — see Caddyfile in the tracepass-platform repo.
#
# Stateless: no DB, no Redis, no persistent volumes. Each MCP request
# carries its own TracePass API key and constructs a fresh session.
# Restart is cheap; horizontal scale is just adding replicas.
#
# Deploy from your laptop:
#   ./scripts/deploy-prod.sh

services:

  mcp:
    build:
      context: .
      dockerfile: Dockerfile
    image: tracepass-mcp:prod
    container_name: tracepass-mcp
    restart: unless-stopped
    environment:
      - PORT=8080
      # The MCP tools forward to the platform's v1 REST API. In prod
      # this is the platform container on the shared docker network —
      # no need to round-trip through Caddy + public DNS.
      - TRACEPASS_BASE_URL=http://platform:3000
    networks:
      - tracepass
    # No `ports:` — Caddy reverse-proxies https://ai.tracepass.eu/mcp
    # to `mcp:8080` over the internal network.

networks:
  tracepass:
    # OWNED by tracepass-platform's compose file. This block declares
    # the network as external so docker compose won't try to (re)create
    # it. If the platform stack isn't up, `docker compose up` here will
    # fail with "network tracepass declared as external, but could not
    # be found" — which is the correct failure mode (no platform =
    # nothing for the MCP to forward to).
    external: true
    name: tracepass
